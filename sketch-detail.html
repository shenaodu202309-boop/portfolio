<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画廊阵列展示 | Sketches Gallery Grid</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans">

    <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="inline-flex items-center gap-2 text-sm text-zinc-400 hover:text-white transition">
                <i class="fa-solid fa-arrow-left"></i> 返回主页作品集
            </a>
            <div class="text-sm font-bold text-gray-400 font-mono">SKETCH LAB // GALLERY</div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12 space-y-12">

            <p class="text-zinc-400 text-sm max-w-2xl leading-relaxed">

            </p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            
            <div class="group relative aspect-[3/4] bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800 shadow-lg hover:border-zinc-600 transition p-2">
                <div class="w-full h-full bg-cover bg-center rounded-xl" style="background-image: url('sketch1.jpg');">
                    <div class="w-full h-full flex items-center justify-center text-xs text-zinc-600 italic group-hover:text-zinc-400">高清原图 01</div>
                </div>
            </div>

                </div>
            </div>

            <div class="group relative aspect-[3/4] bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800 shadow-lg hover:border-zinc-600 transition p-2">

                </div>
            </div>

            <div class="group relative aspect-[3/4] bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800 shadow-lg hover:border-zinc-600 transition p-2">

                    <div class="w-full h-full flex items-center justify-center text-xs text-zinc-600 italic group-hover:text-zinc-400">高清原图 04</div>
                </div>
            </div>

            <div class="group relative aspect-[3/4] bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800 shadow-lg hover:border-zinc-600 transition p-2">
                <div class="w-full h-full bg-cover bg-center rounded-xl" style="background-image: url('sketch5.jpg');">
                    <div class="w-full h-full flex items-center justify-center text-xs text-zinc-600 italic group-hover:text-zinc-400">高清原图 05</div>
                </div>
            </div>

            <div class="group relative aspect-[3/4] bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800 shadow-lg hover:border-zinc-600 transition p-2">

</html>
