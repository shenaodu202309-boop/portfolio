<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申澳主 Aodu Shen - 个人简历 / RESUME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 保持和你主页完全一致的个性手写体环境 */
        * {
            font-family: "凌慧体-简", Kaiti, "PingFang SC", sans-serif !important;
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-gray-100 p-8 text-center transition-all duration-300 hover:shadow-gray-100">
        
        <div class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <i class="fa-regular fa-folder-open text-gray-600 text-2xl"></i>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-2">简历下载与查阅</h1>
        <p class="text-sm text-gray-500 mb-8 uppercase tracking-wider">Please select your preferred language</p>

        <div class="space-y-4">
            
            <a href="assets/chinese-resume.pdf" target="_blank" class="group w-full py-4 px-6 bg-gray-50 hover:bg-gray-300 text-gray-700 hover:text-white rounded-2xl flex items-center justify-between font-medium border border-gray-100 shadow-sm transition-all duration-300 hover:-translate-y-0.5">
                <span class="flex items-center">
                    <i class="fa-regular fa-file-pdf mr-3 text-lg text-gray-500 group-hover:text-white"></i>
                    点击查阅：中文个人简历
                </span>
                <i class="fa-solid fa-arrow-right text-gray-400 group-hover:text-white transition-transform group-hover:translate-x-1"></i>
            </a>

            <a href="assets/english-resume.pdf" target="_blank" class="group w-full py-4 px-6 bg_gray-50 hover:bg-gray-300 text-gray-700 hover:text-white rounded-2xl flex items-center justify-between font-medium border border-gray-100 shadow-sm transition-all duration-300 hover:-translate-y-0.5">
                <span class="flex items-center">
                    <i class="fa-regular fa-file-pdf mr-3 text-lg text-gray-500 group-hover:text-white"></i>
                    VIEW: English Resume
                </span>
                <i class="fa-solid fa-arrow-right text-gray-400 group-hover:text-white transition-transform group-hover:translate-x-1"></i>
            </a>

        </div>

        <div class="mt-8">
            <h2 class="text-sm font-bold text-gray-700 mb-2">页面内预览：中文简历</h2>
            <div class="w-full bg-gray-50 rounded-lg overflow-hidden border border-gray-100 shadow-sm">
                <iframe src="assets/chinese-resume.pdf" width="100%" height="720" class="block" title="中文简历预览">您的浏览器不支持内嵌 PDF，请点击上方链接下载查看。</iframe>
            </div>
        </div>

        <div class="mt-6">
            <h2 class="text-sm font-bold text-gray-700 mb-2">页面内预览：英文简历</h2>
            <div class="w-full bg-gray-50 rounded-lg overflow-hidden border border-gray-100 shadow-sm">
                <iframe src="assets/english-resume.pdf" width="100%" height="720" class="block" title="英文简历预览">您的浏览器不支持内嵌 PDF，请点击上方链接下载查看。</iframe>
            </div>
        </div>

        <div class="mt-8 pt-6 border-t border-gray-100">
            <a href="index.html" class="text-xs text-gray-500 hover:text-gray-700 transition-colors">
                <i class="fa-solid fa-arrow-left mr-1"></i> 返回艺术家主页
            </a>
        </div>

    </div>

</body>
</html>
